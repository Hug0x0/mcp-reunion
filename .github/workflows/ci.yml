name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Weekly live smoke test against data.regionreunion.com (Mon 06:00 UTC).
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  smoke:
    # Hits the live ODS API → skip on PR runs so external outages don't
    # block merges. Runs on main pushes, the weekly schedule, and manual
    # dispatch to catch real API regressions.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test
        run: npm run test:smoke
